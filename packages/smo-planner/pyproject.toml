[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "smo-planner"
version = "0.1.0"
description = "SMO Mission Planning Tool"
requires-python = ">=3.11"
dependencies = [
    "smo-common",
    "aiohttp>=3.9",
]

[project.scripts]
smo-planner = "smo_planner.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/smo_planner"]
