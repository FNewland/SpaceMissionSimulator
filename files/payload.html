<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>EOSAT-1 — Payload Ops</title><link rel="stylesheet" href="../vendor/css/fonts.css"><style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0: #060b10; --bg1: #0a1520; --bg2: #0d1e2d; --bg3: #112535;
  --c0: #4a7090; --c1: #7ac0e0; --c2: #a0d8f8;
  --grn: #39e05b; --yel: #f0c040; --red: #f04040; --cyn: #00e8ff; --mag: #e040ff;
  --font: 'Share Tech Mono', monospace; --head: 'Orbitron', sans-serif;
}
body { background: var(--bg0); color: var(--c1); font-family: var(--font); font-size: 12px; overflow-x: hidden; }
a { color: var(--cyn); text-decoration: none; }
#nav { display: flex; align-items: center; gap: 2px; background: var(--bg1); border-bottom: 1px solid #1a3a50; padding: 4px 8px; position: sticky; top: 0; z-index: 100; }
#nav a { padding: 4px 12px; border-radius: 3px; color: var(--c0); font-family: var(--head); font-size: 10px; letter-spacing: .1em; border: 1px solid transparent; }
#nav a:hover, #nav a.active { color: var(--cyn); border-color: #1a4a60; background: var(--bg3); }
#nav a.active { color: #0ff; border-color: var(--cyn); }
#nav .spacer { flex: 1; }
#nav .sc-id { font-family: var(--head); font-size: 11px; color: var(--cyn); letter-spacing: .15em; }
#ws-status { font-size: 10px; padding: 2px 8px; border-radius: 3px; background: var(--bg3); }
.ws-ok { color: #39e05b; } .ws-err { color: #f04040; }
.main-grid { display: grid; gap: 6px; padding: 6px; height: calc(100vh - 38px); }
.panel { background: var(--bg1); border: 1px solid #1a3a50; border-radius: 4px; padding: 8px; overflow: hidden; display: flex; flex-direction: column; }
.panel-title { font-family: var(--head); font-size: 9px; letter-spacing: .15em; color: var(--c0); text-transform: uppercase; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #1a3a50; flex-shrink: 0; }
.panel-body { flex: 1; overflow-y: auto; }
.tm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
.tm-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 4px; border-radius: 2px; background: var(--bg2); }
.tm-row:hover { background: var(--bg3); }
.tm-lbl { color: var(--c0); font-size: 10px; white-space: nowrap; margin-right: 4px; }
.tm-val { font-size: 12px; font-weight: bold; text-align: right; min-width: 70px; }
.tm-unit { font-size: 9px; color: var(--c0); margin-left: 3px; }
.green { color: #39e05b; } .yellow { color: #f0c040; } .red { color: #f04040; } .cyan { color: #00e8ff; } .white { color: #fff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-family: var(--head); letter-spacing: .1em; }
.badge-ok { background: #0a2e14; color: #39e05b; border: 1px solid #1a5a2a; }
.badge-warn { background: #2e2200; color: #f0c040; border: 1px solid #5a4400; }
.badge-alarm { background: #2e0808; color: #f04040; border: 1px solid #5a1010; }
.badge-off { background: #141414; color: #444; border: 1px solid #333; }
.badge-info { background: #0a1e30; color: #00e8ff; border: 1px solid #1a4060; }
.pbar-wrap { background: var(--bg3); border-radius: 3px; height: 8px; overflow: hidden; margin: 2px 0; }
.pbar-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.pbar-grn { background: #39e05b; } .pbar-yel { background: #f0c040; } .pbar-red { background: #f04040; }
.tc-form { display: flex; flex-direction: column; gap: 4px; }
.tc-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.tc-label { color: var(--c0); font-size: 10px; min-width: 90px; flex-shrink: 0; }
.tc-input { background: var(--bg3); border: 1px solid #1a3a50; color: var(--c2); padding: 3px 6px; border-radius: 3px; font-family: var(--font); font-size: 11px; width: 140px; }
.tc-input:focus { border-color: #00e8ff; outline: none; }
select.tc-input { cursor: pointer; }
.btn { background: var(--bg3); border: 1px solid var(--c0); color: var(--c1); padding: 4px 12px; border-radius: 3px; cursor: pointer; font-family: var(--font); font-size: 11px; letter-spacing: .05em; transition: all .15s; }
.btn:hover { border-color: #00e8ff; color: #00e8ff; }
.btn-grn { border-color: #39e05b; color: #39e05b; } .btn-grn:hover { background: #0a2e14; }
.btn-red { border-color: #f04040; color: #f04040; } .btn-red:hover { background: #2e0808; }
.btn-yel { border-color: #f0c040; color: #f0c040; }
.btn-mag { border-color: #e040ff; color: #e040ff; }
#event-log { font-size: 10px; line-height: 1.6; }
.le { padding: 1px 3px; border-radius: 2px; }
.le:hover { background: var(--bg3); }
.lt { color: #3a6080; margin-right: 5px; }
.lc { margin-right: 5px; font-weight: bold; }
.le.ok .lc { color: #39e05b; } .le.err .lc { color: #f04040; }
.le.tm .lc { color: #5090b0; } .le.warn .lc { color: #f0c040; } .le.info .lc { color: #00e8ff; }
canvas { background: #000; border-radius: 4px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 10px; }
.data-table th { color: var(--c0); text-align: left; padding: 2px 6px; border-bottom: 1px solid #1a3a50; font-family: var(--head); font-size: 8px; letter-spacing: .1em; }
.data-table td { padding: 2px 6px; border-bottom: 1px solid #0e1e2c; }
.data-table tr:hover td { background: var(--bg3); }
.rw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.rw-cell { background: var(--bg2); border-radius: 4px; padding: 6px; text-align: center; }
.rw-id { font-family: var(--head); font-size: 8px; color: var(--c0); margin-bottom: 3px; }
.rw-rpm { font-size: 14px; font-weight: bold; }
.main-grid{grid-template-columns:260px 1fr 260px;grid-template-rows:1fr 1fr}.p-pld{grid-column:1;grid-row:1/3}.p-store{grid-column:2;grid-row:1}.p-xfer{grid-column:2;grid-row:2}.p-tc{grid-column:3;grid-row:1}.p-log{grid-column:3;grid-row:2}</style></head><body data-pos="payload"><div id="nav"><span class="sc-id">EOSAT-1</span><div class="spacer"></div><a href="/fd">FD</a><a href="/eps">EPS</a><a href="/ttc">TTC</a><a href="/payload"  class="active">PLD</a><a href="/sys">SYS</a><a href="/fdir">FDIR</a><a href="/instr">INSTR</a><div class="spacer"></div><span id="sim-time" style="color:#7ac0e0;font-size:10px;margin-right:10px"></span><span id="ws-status" class="ws-err">NO LINK</span></div>
<div class="main-grid">
  <div class="panel p-pld">
    <div class="panel-title">Payload Imager</div>
    <div class="panel-body">
      <div class="tm-grid">
        <div class="tm-row"><span class="tm-lbl">MODE</span><span class="tm-val cyan" id="pld-mode">---</span></div>
        <div class="tm-row"><span class="tm-lbl">FPA TEMP</span><span class="tm-val" id="fpa-t">---</span><span class="tm-unit">°C</span></div>
        <div class="tm-row"><span class="tm-lbl">COOLER</span><span class="tm-val" id="cooler-w">---</span><span class="tm-unit">W</span></div>
        <div class="tm-row"><span class="tm-lbl">IMAGES</span><span class="tm-val cyan" id="img-cnt">---</span></div>
        <div class="tm-row"><span class="tm-lbl">STORE USED</span><span class="tm-val" id="store-pct">---</span><span class="tm-unit">%</span></div>
        <div class="tm-row"><span class="tm-lbl">CHKSUM ERR</span><span class="tm-val" id="chk-err">---</span></div>
      </div>
      <div style="margin:6px 0 4px">
        <div style="display:flex;justify-content:space-between"><span class="tm-lbl">STORE FILL</span><span id="store-pct2">0%</span></div>
        <div class="pbar-wrap"><div class="pbar-fill pbar-grn" id="store-bar" style="width:0%"></div></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">
        <button class="btn btn-grn" onclick="sendTC(8,1,{function_id:0x0003})">IMAGING ON</button>
        <button class="btn" onclick="sendTC(8,1,{function_id:0x0004})">HIGH RES</button>
        <button class="btn" onclick="sendTC(8,1,{function_id:0x0002})">STANDBY</button>
        <button class="btn btn-red"  onclick="sendTC(8,1,{function_id:0x0001})">PAYLOAD OFF</button>
        <button class="btn" onclick="sendTC(8,1,{function_id:0x0030})">COOLER ON</button>
        <button class="btn" onclick="sendTC(8,1,{function_id:0x0031})">COOLER OFF</button>
        <button class="btn" onclick="sendTC(15,1,{session_id:1})">CREATE SESS</button>
        <button class="btn" onclick="sendTC(15,6,{session_id:1})">COPY→DOWNLINK</button>
        <button class="btn" onclick="sendTC(15,9,{session_id:1})">SESS STATUS</button>
        <button class="btn" onclick="sendTC(13,2,{transfer_id:1,total_size:4096})">DATA DOWNLINK</button>
        <button class="btn" onclick="sendTC(23,128,{file_id:0,file_path:'/data/'})">DIR LIST</button>
      </div>
    </div>
  </div>
  <div class="panel p-store">
    <div class="panel-title">On-Board Storage Sessions</div>
    <div class="panel-body"><table class="data-table"><thead><tr><th>SID</th><th>ENABLED</th><th>PACKETS</th><th>SIZE</th><th>AGE</th></tr></thead><tbody id="sess-table"></tbody></table></div>
  </div>
  <div class="panel p-xfer">
    <div class="panel-title">File System</div>
    <div class="panel-body"><table class="data-table"><thead><tr><th>FID</th><th>PATH</th><th>SIZE</th></tr></thead><tbody id="file-table"></tbody></table></div>
  </div><div class="panel p-tc"><div class="panel-title">TC Uplink</div><div class="panel-body"><div class="tc-form"><div class="tc-row"><span class="tc-label">Command</span><select id="tc-sel" class="tc-input" style="width:200px" onchange="populateTcFields()"></select></div><div id="tc-fields"></div><div class="tc-row" style="margin-top:4px"><span class="tc-label">APID</span><input id="tc-apid" class="tc-input" value="1" style="width:60px"><button class="btn btn-grn" onclick="sendTCFromForm()">SEND TC</button></div></div></div></div><div class="panel p-log"><div class="panel-title">Event Log</div><div class="panel-body"><div id="event-log"></div></div></div>
</div>
<script>
// ── COMMON JS (inlined into each position page) ──────────────────────────

const WS_URL   = `ws://${location.host}/ws`;
const CAT_URL  = `/catalog`;
let ws, catalog = {tc:[], failures:{}};
let state = {};
let log = [];
const MAX_LOG = 200;

// ── WebSocket ────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => { wsStatus('LINK', 'ok'); fetchCatalog(); };
  ws.onclose = () => { wsStatus('NO LINK', 'err'); setTimeout(connectWS, 3000); };
  ws.onerror = () => wsStatus('ERROR', 'err');
  ws.onmessage = e => {
    try {
      const m = JSON.parse(e.data);
      if (m.type === 'state')     { state = m.data; onState(m.data); }
      if (m.type === 'tm_packet') onTmPacket(m);
      if (m.type === 'tc_ack')    onTcAck(m);
      if (m.type === 'tc_err')    onTcErr(m);
    } catch(ex) {}
  };
}

function wsStatus(txt, cls) {
  const el = document.getElementById('ws-status');
  if (!el) return;
  el.textContent = txt;
  el.className   = 'ws-' + cls;
}

async function fetchCatalog() {
  try {
    const pos = document.body.dataset.pos || '';
    const r   = await fetch(CAT_URL + (pos ? `?pos=${pos}` : ''));
    catalog   = await r.json();
    if (typeof onCatalog === 'function') onCatalog(catalog);
  } catch(ex) {}
}

// ── TC send ──────────────────────────────────────────────────────────────
function sendTC(service, subtype, params, apid=1) {
  if (!ws || ws.readyState !== 1) { addLog('SYS','WS not connected','err'); return; }
  ws.send(JSON.stringify({type:'tc', service, subtype, params, apid}));
}

function sendInstr(cmd) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({type:'instr', cmd}));
}

// ── Event log ────────────────────────────────────────────────────────────
function addLog(cat, msg, cls='info') {
  const t  = new Date().toISOString().slice(11,23);
  log.unshift({t, cat, msg, cls});
  if (log.length > MAX_LOG) log.length = MAX_LOG;
  renderLog();
}

function renderLog() {
  const el = document.getElementById('event-log');
  if (!el) return;
  el.innerHTML = log.slice(0,60).map(e =>
    `<div class="le ${e.cls}"><span class="lt">${e.t}</span>` +
    `<span class="lc">[${e.cat}]</span> ${e.msg}</div>`
  ).join('');
}

function onTcAck(m)  { addLog('TC',  `ACK S${m.service}/${m.subtype} seq=${m.seq}`, 'ok'); }
function onTcErr(m)  { addLog('TC',  `ERR ${m.error}`, 'err'); }
function onTmPacket(m) { addLog('TM', `APID=${m.apid} S${m.service}/${m.subtype} len=${m.len}`, 'tm'); }

// ── Limit CSS ─────────────────────────────────────────────────────────────
function limitCls(val, ylo, yhi, rlo, rhi) {
  if (val <= rlo || val >= rhi)    return 'red';
  if (val <= ylo || val >= yhi)    return 'yellow';
  return 'green';
}

function fmtNum(v, dp=2) { return (v == null ? '---' : Number(v).toFixed(dp)); }
function fmtBool(v, t='ON', f='OFF') { return v ? t : f; }

// ── Navigation bar ────────────────────────────────────────────────────────
function buildNav(active) {
  const positions = {
    fd:'FD', eps:'EPS', ttc:'TTC', payload:'PLD', sys:'SYS', fdir:'FDIR', instr:'INSTR'
  };
  return Object.entries(positions).map(([k,v]) =>
    `<a href="/${k}" class="${k===active?'active':''}">${v}</a>`
  ).join('');
}

// ── Sim time display ──────────────────────────────────────────────────────
function fmtSimTime(s) {
  if (!s) return '---';
  const d = new Date(s * 1000);
  return d.toISOString().slice(0,19).replace('T',' ') + 'Z';
}

function onState(s) {
  document.getElementById('sim-time').textContent = fmtSimTime(s.sim_time);
  const p=s.payload||{};
  setText('pld-mode', p.mode||'---');
  setV('fpa-t',    p.fpa_temp_C,   -200,-40,-220,-30);
  setV('cooler-w', p.cooler_W,      0,20,0,30);
  setText('img-cnt',  p.image_count||0);
  const sp=parseFloat(p.store_used_pct)||0;
  setV('store-pct', sp, 0,80, 0,95);
  setV('chk-err',   p.checksum_errs||0, 0,0, 0,10);
  const bar=document.getElementById('store-bar');
  if(bar){bar.style.width=sp+'%';bar.className='pbar-fill '+(sp<70?'pbar-grn':sp<90?'pbar-yel':'pbar-red');}
  const sp2=document.getElementById('store-pct2');if(sp2)sp2.textContent=fmtNum(sp,1)+'%';
}
function setV(id,val,ylo,yhi,rlo,rhi){const e=document.getElementById(id);if(!e)return;e.textContent=fmtNum(val,2);e.className='tm-val '+limitCls(val||0,ylo,yhi,rlo,rhi);}
function setText(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}
function onTmPacket(m) {
  addLog('TM',`APID=${m.apid} S${m.service}/${m.subtype} len=${m.len}`,'tm');
  if(m.service===15)refreshSessions();
  if(m.service===23)refreshFiles();
}
function refreshSessions(){const t=document.getElementById('sess-table');if(!t)return;t.innerHTML='<tr><td colspan=5 style="color:#4a7090">Send S15/9 to refresh</td></tr>';}
function refreshFiles(){const t=document.getElementById('file-table');if(!t)return;t.innerHTML='<tr><td colspan=3 style="color:#4a7090">Send S23/128 to refresh</td></tr>';}

let pldTCs=[];
function onCatalog(cat){
  pldTCs=cat.tc.filter(t=>['payload','sys'].includes(t.position)||!t.position);
  const sel=document.getElementById('tc-sel');sel.innerHTML='';
  pldTCs.forEach((t,i)=>{const o=document.createElement('option');o.value=i;o.textContent=t.label;sel.appendChild(o);});
  populateTcFields();
}
function populateTcFields(){
  const i=parseInt(document.getElementById('tc-sel').value);
  const tc=pldTCs[i];if(!tc)return;
  const div=document.getElementById('tc-fields');div.innerHTML='';
  (tc.fields||[]).forEach(f=>{
    if(f.n==='dummy')return;
    const row=document.createElement('div');row.className='tc-row';
    row.innerHTML=`<span class="tc-label">${f.label}</span><input class="tc-input" id="tcf-${f.n}" value="${f.d}">`;
    div.appendChild(row);
  });
}
function sendTCFromForm(){
  const i=parseInt(document.getElementById('tc-sel').value);
  const tc=pldTCs[i];if(!tc)return;
  const params={};
  (tc.fields||[]).forEach(f=>{const el=document.getElementById('tcf-'+f.n);if(el)params[f.n]=f.t==='float'?parseFloat(el.value):el.value;});
  const apid=parseInt(document.getElementById('tc-apid').value)||1;
  sendTC(tc.service,tc.subtype,params,apid);
}
connectWS();
</script></body></html>
