      - { name: state, type: uint8, description: "0=OFF, 1=ON" }
  - name: S2_PAYLOAD_SHUTTER
    service: 2
    subtype: 1
    description: "Control shutter mechanism (device 0x0603)"
    fields:
      - { name: device_id, type: uint16, description: "Device ID (0x0603)" }
      - { name: state, type: uint8, description: "0=OFF, 1=ON" }
