      - { name: state, type: uint8, description: "0=OFF, 1=ON" }

  # Generic S2 commands for reporting and verification
  - name: S2_REPORT_STATUS
    service: 2
    subtype: 6
    description: "Report device on/off status"
    fields:
      - { name: device_id, type: uint16, description: "Device ID to query" }

  # ===== S3 Housekeeping =====
  - name: HK_REQUEST
    service: 3
    subtype: 27
    description: "Request one-shot HK report"
    fields:
      - { name: sid, type: uint16, description: "Structure ID (1-6, 10)" }
  - name: HK_ENABLE
    aliases: [HK_REPORT_CONFIG]
    service: 3
    subtype: 5
    description: "Enable periodic HK generation"
    fields:
      - { name: sid, type: uint16 }
  - name: HK_DISABLE
    service: 3
    subtype: 6
    description: "Disable periodic HK generation"
    fields:
      - { name: sid, type: uint16 }
  - name: HK_SET_INTERVAL
    service: 3
    subtype: 31
    description: "Modify HK reporting interval"
    fields:
      - { name: sid, type: uint16 }
      - { name: interval_s, type: float32 }

  # ===== S5 Event Reporting Control =====
  - name: EVENT_ENABLE
    service: 5
    subtype: 5
    description: "Enable event report generation for specified event IDs"
    fields:
      - { name: event_id, type: uint16, description: "Event definition ID" }
  - name: EVENT_DISABLE
    service: 5
    subtype: 6
    description: "Disable event report generation for specified event IDs"
    fields:
      - { name: event_id, type: uint16, description: "Event definition ID" }

  # ===== S6 Memory Management =====
  - name: MEM_LOAD
    aliases: [MEM_LOAD_START, MEM_LOAD_DATA, MEM_LOAD_ABORT]
    service: 6
    subtype: 2
    description: "Load data to on-board memory (simplified)"
    fields:
      - { name: memory_id, type: uint8, description: "0=SRAM, 1=EEPROM" }
      - { name: address, type: uint32, description: "Start address" }
      - { name: data, type: bytes, description: "Data to load" }
  - name: MEM_DUMP
    service: 6
    subtype: 5
    description: "Dump on-board memory contents"
    fields:
      - { name: memory_id, type: uint8 }
      - { name: address, type: uint32 }
      - { name: length, type: uint16 }
  - name: MEM_CHECK
    service: 6
    subtype: 9
    description: "Check on-board memory CRC"
    fields:
      - { name: memory_id, type: uint8 }
      - { name: address, type: uint32 }
      - { name: length, type: uint16 }

  # ===== S8 Function Management =====
  # AOCS commands (func_id 0-9)
  - name: AOCS_SET_MODE
    aliases: [SET_AOCS_MODE]
    service: 8
    subtype: 1
    func_id: 0
    description: "Set AOCS mode"
    fields:
      - { name: mode, type: uint8, description: "0=off,1=safe_boot,2=detumble,3=coarse_sun,4=nominal_nadir,5=fine_point,6=slew,7=desaturation,8=eclipse_propagate" }
  - name: AOCS_DESATURATE
    service: 8
    subtype: 1
    func_id: 1
    description: "Start wheel desaturation"
    fields: []
  - name: AOCS_DISABLE_WHEEL
    service: 8
    subtype: 1
    func_id: 2
    description: "Disable specific reaction wheel"
    fields:
      - { name: wheel_idx, type: uint8, description: "Wheel index (0-3)" }
  - name: AOCS_ENABLE_WHEEL
    service: 8
    subtype: 1
    func_id: 3
    description: "Enable specific reaction wheel"
    fields:
      - { name: wheel_idx, type: uint8, description: "Wheel index (0-3)" }
  - name: ST1_POWER
    service: 8
    subtype: 1
    func_id: 4
    description: "Star tracker 1 power on/off"
    fields:
      - { name: on, type: uint8, description: "0=off, 1=on" }
  - name: ST2_POWER
    service: 8
    subtype: 1
    func_id: 5
    description: "Star tracker 2 power on/off"
    fields:
      - { name: on, type: uint8, description: "0=off, 1=on" }
  - name: ST_SELECT
    service: 8
    subtype: 1
    func_id: 6
    description: "Select primary star tracker"
    fields:
      - { name: unit, type: uint8, description: "0=ST1, 1=ST2" }
  - name: MAG_SELECT
    aliases: [SET_MAG_SELECT]
    service: 8
    subtype: 1
    func_id: 7
    description: "Select magnetometer source"
    fields:
      - { name: unit, type: uint8, description: "0=primary, 1=redundant" }
  - name: RW_SET_SPEED_BIAS
    service: 8
    subtype: 1
    func_id: 8
    description: "Set reaction wheel speed bias"
    fields:
      - { name: wheel_idx, type: uint8 }
      - { name: bias_rpm, type: int16, description: "Speed bias in RPM" }
  - name: MTQ_ENABLE
    service: 8
    subtype: 1
    func_id: 9
    description: "Enable/disable magnetorquers"
    fields:
      - { name: enable, type: uint8, description: "0=disable, 1=enable" }

  # New AOCS commands (func_id 10-15)
  - name: AOCS_SLEW_TO
    service: 8
    subtype: 1
    func_id: 10
    description: "Execute slew maneuver to target quaternion"
    fields:
      - { name: q_x, type: float32, description: "Target quaternion X component" }
      - { name: q_y, type: float32, description: "Target quaternion Y component" }
      - { name: q_z, type: float32, description: "Target quaternion Z component" }
      - { name: q_w, type: float32, description: "Target quaternion W component (scalar)" }
      - { name: rate_dps, type: float32, description: "Slew rate in deg/s (0.1-10.0)" }

  - name: AOCS_CHECK_MOMENTUM
    service: 8
    subtype: 1
    func_id: 11
    description: "Query reaction wheel momentum status"
    fields: []

  - name: AOCS_BEGIN_ACQUISITION
    service: 8
    subtype: 1
    func_id: 12
    description: "Start automated attitude acquisition sequence"
    fields: []

  - name: AOCS_GYRO_CALIBRATION
    service: 8
    subtype: 1
    func_id: 13
    description: "Reset gyro bias estimate"
    fields: []

  - name: AOCS_RW_RAMP_DOWN
    service: 8
    subtype: 1
    func_id: 14
    description: "Gracefully reduce reaction wheel speed"
    fields:
      - { name: wheel_idx, type: uint8, description: "Wheel index (0-3) or 255 for all" }
      - { name: target_rpm, type: float32, description: "Target wheel speed (RPM)" }

  - name: AOCS_SET_DEADBAND
    service: 8
    subtype: 1
    func_id: 15
    description: "Set attitude error deadband threshold"
    fields:
      - { name: deadband_deg, type: float32, description: "Attitude error threshold (0-1 deg)" }

  # EPS commands (func_id 16-25)
  - name: EPS_PAYLOAD_MODE
    aliases: [SET_PAYLOAD_MODE]
    service: 8
    subtype: 1
    func_id: 16
    description: "Set payload power mode"
    fields:
      - { name: mode, type: uint8, description: "0=off, 1=standby, 2=imaging" }
  - name: EPS_FPA_COOLER
    aliases: [SET_FPA_COOLER]
    service: 8
    subtype: 1
    func_id: 17
    description: "Enable/disable FPA cooler"
    fields:
      - { name: on, type: uint8, description: "0=off, 1=on" }
  - name: EPS_TRANSPONDER_TX
    service: 8
    subtype: 1
    func_id: 18
    description: "Enable/disable transponder TX"
    fields:
      - { name: on, type: uint8, description: "0=off, 1=on" }
  - name: EPS_POWER_ON
    aliases: [POWER_LINE_ON]
    service: 8
    subtype: 1
    func_id: 19
    description: "Switch power line ON"
    fields:
      - { name: line_index, type: uint8, description: "Power line index (0-7)" }
  - name: EPS_POWER_OFF
    aliases: [POWER_LINE_OFF]
    service: 8
    subtype: 1
    func_id: 20
    description: "Switch power line OFF"
    fields:
      - { name: line_index, type: uint8, description: "Power line index (0-7)" }
  - name: EPS_RESET_OC_FLAG
    service: 8
    subtype: 1
    func_id: 21
