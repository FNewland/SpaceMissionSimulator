    command_services: [3, 8, 20]

  - id: COM-011
    name: "Payload Calibration"
    file: "commissioning/payload_calibration.md"
    category: commissioning
    required_positions: [flight_director, payload_ops]
    position_roles:
      flight_director: "Authorize calibration"
