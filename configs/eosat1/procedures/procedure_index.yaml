procedures:
  # === LEOP Procedures ===
  # Cold-boot ordering note: under the new initial state where ttc_tx,
  # aocs_wheels, payload, fpa_cooler, htr_bat and htr_obc all default OFF
  # and the OBDH is in bootloader, LEOP-001 establishes the link and exits
  # the bootloader, then LEOP-007 is run BEFORE -004 / -005 / -006 because
  # those need wheels powered and the OBC in application mode.

  - id: LEOP-001
    name: "First Acquisition of Signal & OBC Boot"
    file: "leop/first_acquisition.md"
    category: leop
    required_positions: [flight_director, ttc, fdir_systems]
    position_roles:
      flight_director: "Authorize pass start, GO/NO-GO decisions"
      ttc: "Configure ground station, monitor RF acquisition"
      fdir_systems: "Issue OBC_BOOT_APP, verify sw_image transition"
    command_services: [3, 8, 9, 17]

  - id: LEOP-002
    name: "Initial Health Check"
    file: "leop/initial_health_check.md"
    category: leop
    required_positions: [flight_director, eps_tcs, fdir_systems]
    position_roles:
      flight_director: "Coordinate checkout sequence"
      eps_tcs: "Verify power and thermal status"
      fdir_systems: "Verify OBDH and HK configuration"
    command_services: [3, 5, 8, 17]

  - id: LEOP-003
    name: "Initial Orbit Determination"
    file: "leop/initial_orbit_determination.md"
    category: leop
    required_positions: [flight_director, aocs, ttc]
    position_roles:
      flight_director: "Approve orbit solution"
      aocs: "Process orbit data, update onboard ephemeris"
      ttc: "Provide range/Doppler data"
    command_services: [8, 9]

  - id: LEOP-004
    name: "Solar Array Verification"
    file: "leop/solar_array_verification.md"
    category: leop
    required_positions: [flight_director, eps_tcs]
    position_roles:
      flight_director: "Authorize deployment verification"
      eps_tcs: "Monitor solar array currents and voltages"
    command_services: [8]

  - id: LEOP-005
    name: "Sun Acquisition"
    file: "leop/sun_acquisition.md"
    category: leop
    required_positions: [flight_director, aocs]
    position_roles:
      flight_director: "Authorize attitude maneuver"
      aocs: "Command AOCS mode transition, monitor rates"
    command_services: [8]

  - id: LEOP-006
    name: "Time Synchronisation"
    file: "leop/time_sync.md"
    category: leop
    required_positions: [flight_director]
    position_roles:
      flight_director: "Execute time sync, verify accuracy"
    command_services: [9]

  - id: LEOP-007
    name: "Sequential Power-On"
    file: "leop/sequential_power_on.md"
    category: leop
    required_positions: [flight_director, eps_tcs, aocs, ttc, fdir_systems]
    position_roles:
      flight_director: "Coordinate power-on sequence, GO/NO-GO decisions"
      eps_tcs: "Command power lines, monitor power budget"
      aocs: "Commission AOCS sensors and actuators"
      ttc: "Monitor link quality throughout"
      fdir_systems: "Monitor OBDH health, configure alarms"
    command_services: [8, 3, 5]

