name: "Star Tracker Failure"
difficulty: ADVANCED
duration_s: 2400
briefing: |
  Star tracker 1 experiences a hardware failure at T+120s, going blind.
  The operator must detect the failure, switch to the redundant unit,
  and verify attitude recovery in degraded mode.
events:
  - time_offset_s: 120
    action: inject
    params:
      subsystem: aocs
      failure: st_failure
      magnitude: 1.0
      onset: step
      unit: 1
expected_responses:
  - { category: detect, description: "Detect ST1 status change to FAILED and attitude error increase" }
  - { category: isolate, description: "Identify ST1 hardware failure vs temporary blinding" }
  - { category: recover, description: "Power on ST2, select as primary, verify pointing recovery" }
