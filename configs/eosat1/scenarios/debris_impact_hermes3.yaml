# Debris-impact scenario — HERMES-3 SA-2B strike
# Mapped to SMO ScenarioEngine schema with verified failure names and param_ids.
#
# Subsystem mapping from original briefing:
#   adcs → aocs   |   comms → ttc   |   obc → obdh
#
# Failure name mapping (original → SMO model):
#   solar_array_cell_loss → solar_panel_loss (face: my)
#   gimbal_drive_fault    → rw_bearing (wheel: 1)
#   heater_circuit_cut    → cooler_failure
#   tx_power_reduction    → uplink_loss
#   pme_undervoltage_trip → bus_failure
#   safe_mode_lockout     → watchdog_reset (conditional on SoC)
#
# Param ID corrections (parameters.yaml):
#   bus_voltage  = 0x0105   (NOT 0x0107 which is power_gen)
#   bat_soc      = 0x0101
#   power_gen    = 0x0107
#   rw2_speed    = 0x0208
#   temp_battery = 0x0407

name: "Debris Impact — HERMES-3 SA-2B (corrected)"
difficulty: ADVANCED
duration_s: 2400
briefing: |
  A debris fragment strikes HERMES-3 at T+00:00, destroying ~31% of the -Y solar
  wing (SA-2B panel). The strike triggers a cascading failure across EPS, AOCS,
  TCS, TTC and OBDH that must be stabilised within the contact window before
  autonomous FDIR safes the spacecraft at T+22 min.

  Operators must: triage EPS root cause within 90 s, isolate SA-2B, desaturate
  RW-2 before 6000 RPM, restore heaters once bus ≥ 23 V, and return to nominal
  mode before battery SoC falls below 60%.

events:

  # F-1 EPS — -Y solar panel partial loss (SA-2B / my face)
  - time_offset_s: 0
    action: inject
    params:
      subsystem: eps
      failure: solar_panel_loss
      magnitude: 0.62        # 62% degradation — models 37/120 cells destroyed + gimbal offset
      onset: step
      face: my               # maps to SA-B wing (-Y face)

  # Drive bus voltage below 24 V minimum to force alarm
  - time_offset_s: 0
    action: set_parameter
    params:
      param_id: 0x0105       # eps.bus_voltage
      value: 23.1

  # Start battery draining (SoC visible to operator)
  - time_offset_s: 0
    action: set_parameter
    params:
      param_id: 0x0101       # eps.bat_soc
      value: 78.0

  # Reduced power generation visible on HK
  - time_offset_s: 0
    action: set_parameter
    params:
      param_id: 0x0107       # eps.power_gen
      value: 741.0

  # F-2 AOCS — RW-2 bearing degradation from impact torque (T+02:15)
  - time_offset_s: 135
    action: inject
    params:
      subsystem: aocs
      failure: rw_bearing
      magnitude: 0.9
      onset: gradual
      onset_duration_s: 30
      wheel: 1               # RW-2 (0-indexed)

  # Force RW-2 speed into alarm range
  - time_offset_s: 135
    action: set_parameter
    params:
      param_id: 0x0208       # aocs.rw2_speed
      value: 5620.0

  # F-3 TCS — heater circuit cut by EPS load shed (T+04:40)
  - time_offset_s: 280
    action: inject
    params:
      subsystem: tcs
      failure: cooler_failure
      magnitude: 1.0
      onset: step

  # Battery temperature dropping (heater off)
  - time_offset_s: 280
    action: set_parameter
    params:
      param_id: 0x0407       # tcs.temp_battery
      value: 8.0

  # F-4 TTC — uplink degraded by load shed (T+07:10)
  - time_offset_s: 430
    action: inject
    params:
      subsystem: ttc
      failure: uplink_loss
      magnitude: 1.0
      onset: step

  # F-5 OBDH — CAN bus failure as bus voltage continues to sag (T+11:00)
  - time_offset_s: 660
    action: inject
    params:
      subsystem: obdh
      failure: bus_failure
      magnitude: 1.0
      onset: step

  # Safe-mode lockout: if SoC falls below 60% and no recovery (conditional)
  - condition: "256 < 60"    # 256 = 0x0101 decimal (bat_soc)
    action: inject
    params:
      subsystem: obdh
      failure: watchdog_reset
      magnitude: 1.0
      onset: step

expected_responses:
  - category: detect
    description: >
      Identify EPS as root cause within 90 s — confirm bus < 24 V and power_gen < 900 W.
      Issue load-shed tier-1 to stop SoC decline.
  - category: isolate
    description: >
      Isolate SA-2B degraded panel. Command EPS safe mode (S8 func 83, mode 1).
      If SoC < 80%, limit battery discharge current.
  - category: recover
    description: >
      AOCS: monitor RW-2 speed; switch to SUN_SAFE attitude if > 5000 RPM.
      Desaturate RW-2 before saturation limit.
  - category: recover
    description: >
      TCS: monitor battery temperature. Restore heaters once bus ≥ 23 V sustained.
  - category: recover
    description: >
      OBDH: switch active CAN bus (S8 func 54) to restore subsystem telemetry.
  - category: recover
    description: >
      TTC: restore TX power once bus ≥ 24 V. Verify uplink margin before further commands.
  - category: recover
    description: >
      Full recovery: bus ≥ 25 V sustained, SoC ≥ 80%, return OBC to NOMINAL mode,
      restore payload power in stepped intervals, clear all fault flags.
