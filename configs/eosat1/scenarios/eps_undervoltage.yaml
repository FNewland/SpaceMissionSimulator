name: "Battery Depletion During Eclipse"
difficulty: ADVANCED
duration_s: 3600
briefing: |
  An extended eclipse with high power consumption causes battery depletion.
  Bus voltage drops below thresholds starting at T+300s. The operator must
  execute load shedding before FDIR triggers safe mode.
events:
  - time_offset_s: 300
    action: inject
    params:
      subsystem: eps
      failure: undervoltage
      magnitude: 3.0
      onset: gradual
      onset_duration_s: 600
expected_responses:
  - { category: detect, description: "Detect bus voltage declining below 27V" }
  - { category: isolate, description: "Correlate with eclipse phase and power balance" }
  - { category: recover, description: "Shed non-essential loads in priority order" }
