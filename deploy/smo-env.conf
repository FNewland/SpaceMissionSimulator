# =============================================================================
# SMO Suite — Environment Configuration
# =============================================================================
# Edit this file to configure IP addresses and ports for your deployment.
#
# SINGLE MACHINE:  Leave all *_HOST values as "localhost" or "0.0.0.0".
# DISTRIBUTED:     Set each *_HOST to the IP/hostname of the machine running
#                  that component. All machines must be able to reach each
#                  other on the configured ports.
#
# After editing, run the individual start-*.sh scripts on each machine,
# or start-all.sh to run everything on this machine.
# =============================================================================

# ---------------------------------------------------------------------------
# SIMULATOR — The spacecraft simulation engine
# ---------------------------------------------------------------------------
# Host where the simulator runs (used by MCS/Gateway to connect TO it)
SIMULATOR_HOST="localhost"
# TCP port for telecommand uplink
SIMULATOR_TC_PORT=8001
# TCP port for telemetry downlink broadcast
SIMULATOR_TM_PORT=8002
# HTTP port for the instructor/debug web interface
SIMULATOR_HTTP_PORT=8080
# Simulation speed multiplier (1.0 = real-time, 2.0 = 2x speed, etc.)
SIMULATOR_SPEED=1.0

# ---------------------------------------------------------------------------
# GATEWAY (optional) — TM/TC relay for multi-site MCS deployments
# ---------------------------------------------------------------------------
# Set USE_GATEWAY="yes" to route MCS traffic through the gateway
# instead of connecting directly to the simulator.
USE_GATEWAY="no"
# Host where the gateway runs
GATEWAY_HOST="localhost"
# Port the gateway listens on for downstream MCS connections
GATEWAY_LISTEN_PORT=10025
# Upstream: where the gateway connects (normally the simulator TM port)
GATEWAY_UPSTREAM_HOST="${SIMULATOR_HOST}"
GATEWAY_UPSTREAM_PORT="${SIMULATOR_TM_PORT}"

# ---------------------------------------------------------------------------
# MCS — Mission Control System web interface
# ---------------------------------------------------------------------------
# Host/IP to bind the MCS HTTP server to ("0.0.0.0" = all interfaces)
MCS_BIND="0.0.0.0"
# HTTP port for the MCS web UI (operators connect browsers here)
MCS_HTTP_PORT=9090
# Where MCS connects for TM data:
#   If USE_GATEWAY="yes", this should point at the gateway.
#   If USE_GATEWAY="no",  this should point at the simulator.
MCS_TM_HOST="${SIMULATOR_HOST}"
MCS_TM_PORT="${SIMULATOR_TM_PORT}"

# ---------------------------------------------------------------------------
# PLANNER — Mission planning tool
# ---------------------------------------------------------------------------
# Host/IP to bind the Planner HTTP server to
PLANNER_BIND="0.0.0.0"
# HTTP port for the Planner web UI
PLANNER_HTTP_PORT=9091
# Host where the planner is reachable FROM the MCS (for the MCS UI's
# planner integration — ground track, contacts, etc.)
# If same machine: "localhost". If different machine: use the planner's IP.
PLANNER_REACHABLE_HOST="localhost"

# ---------------------------------------------------------------------------
# MISSION CONFIGURATION
# ---------------------------------------------------------------------------
# Path to the mission configuration directory (relative to project root)
MISSION_CONFIG="configs/eosat1/"

# ---------------------------------------------------------------------------
# NETWORK ACCESS — Firewall reminders
# ---------------------------------------------------------------------------
# For distributed deployment, ensure these ports are open:
#   Simulator machine:  ${SIMULATOR_TC_PORT}, ${SIMULATOR_TM_PORT}, ${SIMULATOR_HTTP_PORT}
#   Gateway machine:    ${GATEWAY_LISTEN_PORT}
#   MCS machine:        ${MCS_HTTP_PORT}
#   Planner machine:    ${PLANNER_HTTP_PORT}
#
# All web UIs (MCS, Planner, Simulator Instructor) can be accessed from
# any browser on the network by navigating to:
#   http://<machine-ip>:<port>
